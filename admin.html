<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h1>Leads Dashboard</h1>

<div id="login-section">
  <h2>Admin Login</h2>
  <input id="admin-email" placeholder="Email"><br><br>
  <input id="admin-password" type="password" placeholder="Password"><br><br>
  <button onclick="adminLogin()">Login</button>
</div>

<div id="dashboard" style="display:none;">
  <h2>All Leads</h2>
  <div style="margin-bottom:15px 0;">
  <button onclick="filterLeads('all')">All</button>
<button onclick="filterLeads('new')">New</button>
<button onclick="filterLeads('contacted')">Contacted</button>
<button onclick="filterLeads('interested')">Interested</button>
<button onclick="filterLeads('closed')">Closed</button>
  </div>
<div style="display:flex; justify-content:space-between; align-items:center;">
  <h1>Admin Dashboard</h1>
  <button class="danger" onclick="logout()">Logout</button>
</div>
<hr>

<h2>Add Customer</h2>

<input id="cust-name" placeholder="Customer Name"><br><br>
<input id="cust-phone" placeholder="Phone"><br><br>
<input id="cust-policy" placeholder="Policy Type"><br><br>
<input id="cust-premium" placeholder="Premium Amount"><br><br>
<input id="cust-due" type="date"><br><br>

<button class="primary" onclick="addCustomer()">Add Customer</button>

<hr>

</div>

<div class="card">
<h2>All Customers</h2></div>
<button class="secondary" onclick="loadCustomers()">🔄 Refresh</button>



<div id="customers-container"></div>
</div>
<div class="card">
  <h2>User Requests</h2>
<div id="requests-container">
  </div>
</div>
<div class="card">
<h2>📅 Due Today / Overdue</h2></div>
<div id="due-container"></div>


<div id="status-container" style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:20px;">
  
  <div class="card">Total: <span id="total-count">0</span></div>
  <div class="card">New: <span id="new-count">0</span></div>
  <div class="card">Contacted: <span id="contacted-count">0</span></div>
  <div class="card">Interested: <span id="interested-count">0</span></div>
  <div class="card">Closed: <span id="closed-count">0</span></div>

</div>
<div class="card">
  <h2>Leads List</h2>
  <div id="leads-container"></div>
</div></div>

<div class="container"></div>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  margin: 0;
  padding: 20px;
}

h1 {
  color: #2c3e50;
}

h2 {
  margin-top: 30px;
  color: #34495e;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  margin: 5px;
  transition: 0.2s;
}

h2 {
  border-left: 5px solid #4CAF50;
  padding-left: 10px;
}

button:hover {
  background: #45a049;
}

input {
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 6px;
  width: 200px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin: 10px 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.container {
  max-width: 900px;
  margin: auto;
}

.section {
  margin-bottom: 30px;
}

.overdue {
  border-left: 5px solid red;
}

.due-today {
  border-left: 5px solid orange;
}

button.danger { background: red; }
button.secondary { background: #555; }
button.primary { background: #4CAF50; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs, 
  doc, 
  updateDoc,
  addDoc 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  onAuthStateChanged,
  signOut 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";


window.addCustomer = async function () {

  const name = document.getElementById("cust-name").value;
  const phone = document.getElementById("cust-phone").value;
  const policy = document.getElementById("cust-policy").value;
  const premium = document.getElementById("cust-premium").value;
  const dueDate = document.getElementById("cust-due").value;

  if (!name || !phone) {
    alert("Fill required fields ❌");
    return;
  }

  await addDoc(collection(db, "customers"), {
    name,
    phone,
    policy,
    premium,
    dueDate,
    createdAt: new Date()
  });

  alert("Customer Added ✅");
  loadCustomers();
  loadDueCustomers();

  // reset form
  document.getElementById("cust-name").value = "";
  document.getElementById("cust-phone").value = "";
  document.getElementById("cust-policy").value = "";
  document.getElementById("cust-premium").value = "";
  document.getElementById("cust-due").value = "";
};

window.loadCustomers = async function () {

  const container = document.getElementById("customers-container");
  container.innerHTML = "Loading...";

  const querySnapshot = await getDocs(collection(db, "customers"));
if (querySnapshot.empty) {
  container.innerHTML = "<p>No data available</p>";
  return;
}
  container.innerHTML = "";

  if (querySnapshot.empty) {
    container.innerHTML = "<p>No customers found</p>";
    return;
  }

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();

    container.innerHTML += `
     <div class="card">
        <p><strong>Name:</strong> ${data.name}</p>
        <p><strong>Phone:</strong> ${data.phone}</p>
        <p><strong>Policy:</strong> ${data.policy}</p>
        <p><strong>Premium:</strong> ₹${data.premium}</p>
        <p><strong>Due Date:</strong> ${data.dueDate}</p>
<p style="color:${data.dueDate < new Date().toISOString().split("T")[0] ? 'red' : 'orange'}; font-weight:bold;">
  ${data.dueDate < new Date().toISOString().split("T")[0] ? '⚠ OVERDUE' : '⏳ UPCOMING'}
</p>
        <a href="tel:${data.phone}">
          <button>📞 Call</button>
        </a>

        <a href="https://wa.me/91${data.phone}" target="_blank">
          <button>💬 WhatsApp</button>
        </a>
      </div>
    `;
  });
};
window.loadDueCustomers = async function () {

  const container = document.getElementById("due-container");
  container.innerHTML = "Loading...";

  const querySnapshot = await getDocs(collection(db, "customers"));
let customers = [];

querySnapshot.forEach((docSnap) => {
  customers.push({
    id: docSnap.id,
    ...docSnap.data()
  });
});

// SORT by due date
customers.sort((a, b) => (a.dueDate || "").localeCompare(b.dueDate || ""));
  container.innerHTML = "";

  const today = new Date().toISOString().split("T")[0];

  let found = false;

  customers.forEach((data) => {
    const id = data.id;

    if (data.dueDate && data.dueDate <= today) {

      found = true;

      const isOverdue = data.dueDate < today;

      container.innerHTML += `
       <div class="card ${isOverdue ? 'overdue' : 'due-today'}">
          <p><strong>Name:</strong> ${data.name}</p>
          <p><strong>Phone:</strong> ${data.phone}</p>
          <p><strong>Due Date:</strong> ${data.dueDate}</p>

<p style="color:${isOverdue ? 'red' : 'orange'}; font-weight:bold;">
  ${isOverdue ? '⚠ OVERDUE' : '⏳ DUE TODAY'}
</p>

          <a href="tel:${data.phone}">
            <button>📞 Call Now</button>
          </a>

          <a href="https://wa.me/91${data.phone}" target="_blank">
            <button>💬 WhatsApp</button>
          </a>
          <button onclick="markPaid('${id}')">✅ Mark Paid</button>
        </div>
      `;
    }
  });

  if (!found) {
    container.innerHTML = "<p>No due customers today ✅</p>";
  }
};

window.markPaid = async function(id) {

  const nextMonth = new Date();
  nextMonth.setMonth(nextMonth.getMonth() + 1);

  const nextDate = nextMonth.toISOString().split("T")[0];

  await updateDoc(doc(db, "customers", id), {
    dueDate: nextDate
  });

  alert("Marked as paid ✅");

  loadDueCustomers();
  loadCustomers();
};

const firebaseConfig = {
  apiKey: "AIzaSyC1u-NqXsGWnMmtbKveCvMfO0FiiymrKQ4",
  authDomain: "falke-system.firebaseapp.com",
  projectId: "falke-system",
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
window.logout = function () {
  signOut(auth).then(() => {
    alert("Logged out");
    location.reload(); // ADD THIS
  });
};
const db = getFirestore(app);
let allLeads = [];
let currentFilter = "all";
let isLoaded = false;
// 🔐 ADMIN EMAIL
const ADMIN_EMAIL = "historicalfacts777@gmail.com";

// ✅ AUTH STATE LISTENER (PUT HERE)
onAuthStateChanged(auth, (user) => {

  if (user && user.email === ADMIN_EMAIL) {

  document.getElementById("login-section").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  if (!isLoaded) {
    loadLeads();
    loadCustomers();
    loadDueCustomers();
    loadRequests();
    isLoaded = true;
  }

} else {
    document.getElementById("login-section").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
  }
});


// LOGIN
window.adminLogin = function () {
  const email = document.getElementById("admin-email").value;
  const password = document.getElementById("admin-password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Login Success");
    })
    .catch(err => alert(err.message));
};

// LOAD LEADS
async function loadLeads() {

  const querySnapshot = await getDocs(collection(db, "leads"));
  allLeads = [];

  querySnapshot.forEach((doc) => {
    allLeads.push({
      id: doc.id,
      ...doc.data()
    });
  });

  // sort latest first
  allLeads.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  renderLeads();
  updateDashboard();
}
async function loadRequests() {

  const querySnapshot = await getDocs(collection(db, "requests"));

  const container = document.getElementById("requests-container");
  container.innerHTML = "";
if (querySnapshot.empty) {
  container.innerHTML = "<p>No data available</p>";
  return;
}
  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();

    container.innerHTML += `
      <div style="border:1px solid #000; padding:10px; margin:10px;">
        <p><strong>Email:</strong> ${data.email}</p>
        <p><strong>Type:</strong> ${data.type}</p>
        <p><strong>Status:</strong> ${data.status}</p>

<input 
  placeholder="Paste Payment Link" 
  id="link-${docSnap.id}" 
  style="width:200px;"
>

<button onclick="sendPayment('${docSnap.id}')">
  💰 Send Payment
</button>
        <button onclick="updateRequestStatus('${docSnap.id}', 'approved')">
          Approve
        </button>

        <button onclick="updateRequestStatus('${docSnap.id}', 'rejected')">
          Reject
        </button>
      </div>
    `;
  });
}
window.updateRequestStatus = async function(id, newStatus) {

  await updateDoc(doc(db, "requests", id), {
    status: newStatus
  });

  alert("Updated ✅");

  loadRequests();
};
window.sendPayment = async function(id) {

  const input = document.getElementById(`link-${id}`);
  const link = input.value;

  if (!link) {
    alert("Enter payment link ❌");
    return;
  }

  await updateDoc(doc(db, "requests", id), {
    paymentLink: link,
    status: "payment_sent"
  });

  alert("Payment link sent ✅");

  loadRequests();
};
function renderLeads() {

  const container = document.getElementById("leads-container");
  container.innerHTML = "";

  let filtered = allLeads;

  if (currentFilter !== "all") {
    filtered = allLeads.filter(lead => lead.status === currentFilter);
  }

  if (filtered.length === 0) {
    container.innerHTML = "<p>No leads found</p>";
    return;
  }

  filtered.forEach((data) => {
    container.innerHTML += `
      <div style="border:1px solid #ccc; padding:15px; margin:10px; border-radius:10px;">
        <p><strong>Name:</strong> ${data.name}</p>
        <p><strong>Phone:</strong> ${data.phone}</p>
        <p><strong>Service:</strong> ${data.service}</p>
        <p><strong>Status:</strong> ${data.status || "new"}</p>

        <a href="tel:${data.phone}">
          <button>📞 Call</button>
        </a>

        <a href="https://wa.me/91${data.phone}" target="_blank">
          <button>💬 WhatsApp</button>
        </a>

        <select onchange="updateStatus('${data.id}', this.value)">
          <option value="new" ${data.status === "new" ? "selected" : ""}>New</option>
          <option value="contacted" ${data.status === "contacted" ? "selected" : ""}>Contacted</option>
          <option value="interested" ${data.status === "interested" ? "selected" : ""}>Interested</option>
          <option value="closed" ${data.status === "closed" ? "selected" : ""}>Closed</option>
        </select>
      </div>
    `;
  });
}

window.filterLeads = function(status) {
  currentFilter = status;
  renderLeads();
};
window.markContacted = async function(id) {

  await updateDoc(doc(db, "leads", id), {
    status: "contacted"
  });

  allLeads = allLeads.map(lead => 
    lead.id === id ? { ...lead, status: "contacted" } : lead
  );

  renderLeads();
  updateDashboard();
};

// update UI without reload

window.updateStatus = async function(id, newStatus) {

  await updateDoc(doc(db, "leads", id), {
    status: newStatus
  });

  // update UI instantly
  allLeads = allLeads.map(lead =>
    lead.id === id ? { ...lead, status: newStatus } : lead
  );

  renderLeads();
  updateDashboard();
};
function updateDashboard() {

  document.getElementById("total-count").innerText = allLeads.length;

  document.getElementById("new-count").innerText =
    allLeads.filter(l => l.status === "new").length;

  document.getElementById("contacted-count").innerText =
    allLeads.filter(l => l.status === "contacted").length;

  document.getElementById("interested-count").innerText =
    allLeads.filter(l => l.status === "interested").length;

  document.getElementById("closed-count").innerText =
    allLeads.filter(l => l.status === "closed").length;
}
</script>

</body>
</html>
