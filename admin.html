<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h1>Leads Dashboard</h1>

<div id="login-section">
  <h2>Admin Login</h2>
  <input id="admin-email" placeholder="Email"><br><br>
  <input id="admin-password" type="password" placeholder="Password"><br><br>
  <button onclick="adminLogin()">Login</button>
</div>

<div id="dashboard" style="display:none;">
  <h2>All Leads</h2>
  <div style="margin-bottom:20px;">
  <button onclick="filterLeads('all')">All</button>
<button onclick="filterLeads('new')">New</button>
<button onclick="filterLeads('contacted')">Contacted</button>
<button onclick="filterLeads('interested')">Interested</button>
<button onclick="filterLeads('closed')">Closed</button>
</div>
<div id="dashboard" style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:20px;">
  
  <div class="card">Total: <span id="total-count">0</span></div>
  <div class="card">New: <span id="new-count">0</span></div>
  <div class="card">Contacted: <span id="contacted-count">0</span></div>
  <div class="card">Interested: <span id="interested-count">0</span></div>
  <div class="card">Closed: <span id="closed-count">0</span></div>

</div>
  <div id="leads-container"></div>
</div>

<style>
  .card {
    border: 1px solid #ccc;
    padding: 15px;
    border-radius: 10px;
    width: 150px;
    text-align: center;
  }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1u-NqXsGWnMmtbKveCvMfO0FiiymrKQ4",
  authDomain: "falke-system.firebaseapp.com",
  projectId: "falke-system",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let allLeads = [];
let currentFilter = "all";

// 🔐 ADMIN EMAIL (VERY IMPORTANT)
const ADMIN_EMAIL = "historicalfacts777@gmail.com";

// LOGIN
window.adminLogin = function () {
  const email = document.getElementById("admin-email").value;
  const password = document.getElementById("admin-password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Login Success");
    })
    .catch(err => alert(err.message));
};

// CHECK AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user && user.email === ADMIN_EMAIL) {
    document.getElementById("login-section").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadLeads();
  } else {
    document.getElementById("login-section").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
  }
});

// LOAD LEADS
async function loadLeads() {

  const querySnapshot = await getDocs(collection(db, "leads"));
  allLeads = [];

  querySnapshot.forEach((doc) => {
    allLeads.push({
      id: doc.id,
      ...doc.data()
    });
  });

  // sort latest first
  allLeads.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  renderLeads();
  updateDashboard();
}
function renderLeads() {

  const container = document.getElementById("leads-container");
  container.innerHTML = "";

  let filtered = allLeads;

  if (currentFilter !== "all") {
    filtered = allLeads.filter(lead => lead.status === currentFilter);
  }

  filtered.forEach((data) => {

    container.innerHTML += `
      <div style="border:1px solid #ccc; padding:15px; margin:10px; border-radius:10px;">
        
        <p><strong>Name:</strong> ${data.name}</p>
        <p><strong>Phone:</strong> ${data.phone}</p>
        <p><strong>Service:</strong> ${data.service}</p>
        <p><strong>Status:</strong> ${data.status || "new"}</p>

        <a href="tel:${data.phone}">
          <button>📞 Call</button>
        </a>

        <a href="https://wa.me/91${data.phone}" target="_blank">
          <button>💬 WhatsApp</button>
        </a>
<select onchange="updateStatus('${data.id}', this.value)">
  <option value="new" ${data.status === "new" ? "selected" : ""}>New</option>
  <option value="contacted" ${data.status === "contacted" ? "selected" : ""}>Contacted</option>
  <option value="interested" ${data.status === "interested" ? "selected" : ""}>Interested</option>
  <option value="closed" ${data.status === "closed" ? "selected" : ""}>Closed</option>
</select>
        

      </div>
    `;
  });
}

window.filterLeads = function(status) {
  currentFilter = status;
  renderLeads();
};
window.markContacted = async function(id) {
  await updateDoc(doc(db, "leads", id), {
    status: "contacted"
  });

  alert("Updated ✅");
  await updateDoc(doc(db, "leads", id), {
  status: "contacted"
});

// update UI without reload
allLeads = allLeads.map(lead => 
  lead.id === id ? { ...lead, status: "contacted" } : lead
);

renderLeads();
updateDashboard();
};
window.updateStatus = async function(id, newStatus) {

  await updateDoc(doc(db, "leads", id), {
    status: newStatus
  });

  // update UI instantly
  allLeads = allLeads.map(lead =>
    lead.id === id ? { ...lead, status: newStatus } : lead
  );

  renderLeads();
};
function updateDashboard() {

  document.getElementById("total-count").innerText = allLeads.length;

  document.getElementById("new-count").innerText =
    allLeads.filter(l => l.status === "new").length;

  document.getElementById("contacted-count").innerText =
    allLeads.filter(l => l.status === "contacted").length;

  document.getElementById("interested-count").innerText =
    allLeads.filter(l => l.status === "interested").length;

  document.getElementById("closed-count").innerText =
    allLeads.filter(l => l.status === "closed").length;
}
</script>

</body>
</html>
