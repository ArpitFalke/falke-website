<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
  <style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  margin: 0;
  padding: 20px;
}

h1, h2 {
  color: #2c3e50;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  margin: 5px;
}

button:hover {
  background: #45a049;
}

button.danger { background: red; }
button.secondary { background: #555; }

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin: 10px 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.container {
  max-width: 800px;
  margin: auto;
}
</style>
</head>
<body>
<div class="container">
<h1>Welcome</h1>

<button class="danger" onclick="logout()">Logout</button>

<h2>Your Actions</h2>

<button onclick="sendRequest('claim')">Request Claim</button>
<button onclick="sendRequest('payment')">Request Payment Link</button>

<h2>Your Requests</h2>
<button class="secondary" onclick="loadRequests()">🔄 Refresh</button>
<div id="requests-container"></div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:  "AIzaSyC1u-NqXsGWnMmtbKveCvMfO0FiiymrKQ4",
  authDomain: "falke-system.firebaseapp.com",
  projectId: "falke-system",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "/";
  } else {
    currentUser = user;
    loadRequests();
  }
});
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "/";
  });
};
window.sendRequest = async function(type) {

  if (!currentUser) return;

  await addDoc(collection(db, "requests"), {
    userId: currentUser.uid,
    email: currentUser.email,
    type: type,
    status: "pending",
    createdAt: new Date()
  });

  alert(type + " request sent ✅");

  loadRequests();
};
async function loadRequests() {

  const q = query(
    collection(db, "requests"),
    where("userId", "==", currentUser.uid)
  );

  const querySnapshot = await getDocs(q);

  const container = document.getElementById("requests-container");
  container.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    console.log(doc.data());

    container.innerHTML += `
  <div class="card">
    
    <p>Type: ${data.type}</p>

    <p>
    Status: 
    <span style="
      color: ${
        data.status === 'approved' ? 'green' :
        data.status === 'rejected' ? 'red' :
        data.status === 'payment_sent' ? 'blue' : 'orange'
      };
      font-weight:bold;
    ">
      ${data.status}
    </span>
    </p>

    ${data.paymentLink ? `
      <a href="${data.paymentLink}" target="_blank">
        <button>💳 Pay Now</button>
      </a>
    ` : ""}

  </div>
`;  
});
}

</script>

</body>
</html>
