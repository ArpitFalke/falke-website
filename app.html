<!DOCTYPE html>
<html>
<head>
  <title>App Dashboard</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fb;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .logo {
      font-weight: bold;
      font-size: 18px;
    }

    .menu button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin: 10px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Falke Services</div>

  <div class="menu">
    <button onclick="showSection('dashboard')">Dashboard</button>
    <button onclick="showSection('requests')">Requests</button>
    <button id="admin-btn" class="hidden" onclick="goAdmin()">Admin</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="container">

  <!-- DASHBOARD -->
  <div id="dashboard-section">
    <h2>Welcome</h2>
    <div class="card">
      <p>This is your dashboard</p>
    </div>
  </div>

  <!-- REQUESTS -->
  <div id="requests-section" class="hidden">
    <h2>Your Requests</h2>
    <button onclick="loadRequests()">🔄 Refresh</button>
    <div id="requests-container"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, getDocs, query, where } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1u-NqXsGWnMmtbKveCvMfO0FiiymrKQ4",
  authDomain: "falke-system.firebaseapp.com",
  projectId: "falke-system",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// AUTH CHECK
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "/";
  } else {
    currentUser = user;

    // show admin button if admin
    if (user.email === "historicalfacts777@gmail.com") {
      document.getElementById("admin-btn").classList.remove("hidden");
    }

    loadRequests();
  }
});

// LOGOUT
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "/";
  });
};

// NAVIGATION
window.showSection = function(section) {
  document.getElementById("dashboard-section").classList.add("hidden");
  document.getElementById("requests-section").classList.add("hidden");

  document.getElementById(section + "-section").classList.remove("hidden");
};

// ADMIN REDIRECT
window.goAdmin = function () {
  window.location.href = "/admin.html";
};

// LOAD REQUESTS
async function loadRequests() {

  const q = query(
    collection(db, "requests"),
    where("userId", "==", currentUser.uid)
  );

  const querySnapshot = await getDocs(q);

  const container = document.getElementById("requests-container");
  container.innerHTML = "";

  if (querySnapshot.empty) {
    container.innerHTML = "<p>No requests found</p>";
    return;
  }

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    container.innerHTML += `
      <div class="card">
        <p>Type: ${data.type}</p>
        <p>Status: ${data.status}</p>

        ${data.paymentLink ? `
          <a href="${data.paymentLink}" target="_blank">
            <button>💳 Pay Now</button>
          </a>
        ` : ""}
      </div>
    `;
  });
}
</script>

</body>
</html>
